# Headless integration test for companion recruit + follow-behind behavior.

name: Companion behavior test

on:
  push:
    branches: [ main, "cursor/**" ]
  pull_request:
    branches: [ main ]

jobs:
  companion-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot 4.6.1
        run: |
          curl -fsSL -o /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x /tmp/godot/Godot_v4.6.1-stable_linux.x86_64
          sudo mv /tmp/godot/Godot_v4.6.1-stable_linux.x86_64 /usr/local/bin/godot-test

      - name: Run companion behavior test
        run: godot-test --headless --path "${{ github.workspace }}" -s res://scripts/companion_behavior_test.gd

      - name: Run mobile touch UI smoke test
        run: godot-test --headless --path "${{ github.workspace }}" -s res://scripts/mobile_touch_smoke_test.gd
